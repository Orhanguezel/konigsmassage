# =============================================================
# Konigsmassage — Nginx Performance Config
# Include in server block: include /etc/nginx/snippets/performance.conf;
# =============================================================

# Brotli compression (requires ngx_brotli module)
# Install: apt install libnginx-mod-brotli (Ubuntu/Debian)
brotli on;
brotli_comp_level 6;
brotli_types text/plain text/css application/javascript application/json application/xml text/xml image/svg+xml application/wasm;

# Gzip fallback (for clients without Brotli support)
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_types text/plain text/css application/javascript application/json application/xml text/xml image/svg+xml;

# Static asset caching — Next.js _next/static files are content-hashed
location /_next/static/ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

# Public assets (images, fonts, etc.)
location ~* \.(jpg|jpeg|png|gif|webp|avif|ico|svg|woff2?|ttf|eot|css|js)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
}

# Uploads directory
location /uploads/ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    access_log off;
}
