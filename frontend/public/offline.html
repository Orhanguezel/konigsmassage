<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Offline</title>
    <style>
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
        background: #f6f1e8;
        color: #1f1a14;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(560px, calc(100vw - 32px));
        background: #fff;
        border: 1px solid #e8dcc7;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 10px 30px rgba(49, 35, 20, 0.08);
      }
      h1 { margin: 0 0 12px; font-size: 28px; }
      p { margin: 0 0 12px; line-height: 1.6; }
      a {
        display: inline-block;
        margin-top: 12px;
        color: #fff;
        background: #8b6b3f;
        text-decoration: none;
        padding: 12px 18px;
        border-radius: 10px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sie sind offline</h1>
      <p>Zurzeit besteht keine Internetverbindung. Bereits geladene Seiten funktionieren weiter, neue Inhalte können erst nach der Verbindung geladen werden.</p>
      <p>You are offline. Cached pages may still work, but new content needs an internet connection.</p>
      <a href="/de">Zur Startseite</a>
    </div>
  </body>
</html>
